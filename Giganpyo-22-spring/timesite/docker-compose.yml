version: "3.7"
services:
  nginx:
    image: nginx:1.21.5
    networks:
      - network
    volumes:
      - /home/ubuntu/nginx.conf:/etc/nginx/nginx.conf
      - static-volume:/data/static
      - media-volume:/data/media
    ports:
      - 80:80
  django_gunicorn:
    image: django-image:1
    networks:
      - network
    volumes:
      - static-volume:/home/ubuntu/mop_rm/Giganpyo-22-spring/timesite/static
      - media-volume:/home/ubuntu/mop_rm/Giganpyo-22-spring/timesite/media

networks:
  network:

volumes:
  static-volume:
  media-volume:
