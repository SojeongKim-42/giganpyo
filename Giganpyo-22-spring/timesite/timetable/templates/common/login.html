<script src="{% static 'jquery-3.5.1.min.js' %}"></script>

<script src="{% static 'bootstrap.min.js' %}"></script>
<div class=line>
    <div>&nbsp</div>
    <div id="login_back">
        <div id="login_title">GI간표</div>
        <div id="login">
            <form method='post' class = "post-form" action="{% url 'common:login' %}">
                {% csrf_token %}
                <input type = "hidden" name="text" value="{{ next }}">
                {% include "form_errors.html" %}
                <div class = "form-group">
                    <label for="username">사용자ID</label>
                    <input type="text" class="form-control" name="username" id="username" value="{{ form.username.value|default_if_none:'' }}">
                </div>
                <div class = "form-group">
                    <label for="password">비밀번호</label>
                    <input type = "password" class="form-control" name="password" id="password" value="{{ form.password.value|default_if_none:'' }}">
                </div>
                <button type="submit" class="btn btn-primary">로그인</button>
            </form>
        </div>
        <div style="text-align: center;">
            <a href="{% provider_login_url 'google' method='oauth2' %}" style="text-transform:none">
                <button type="button" class="login-with-google-btn" >
                  Sign in with Google
                </button>
            </a>
        </div>
        <div style="margin-top:10px;">

        </div>
        <hr>

        <p>혹시 처음 이용하시나요?</p>
        <div id="signup_go_center"><a id="signup_go" href="{% url 'common:signup' %}">계정을 만드세요.</a></div>
